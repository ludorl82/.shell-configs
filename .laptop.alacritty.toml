[window]
startup_mode = "Maximized"
title = "Alacritty"
dynamic_title = false

[window.padding]
x = 4
y = 4


[font]
normal = { family = "Hack Nerd Font Mono" }
size = 14

[[keyboard.bindings]]
key = "B"
mods = "Control|Alt"
chars = "\u001b\u0002"

[[keyboard.bindings]]
key = "F"
mods = "Control|Alt"
chars = "\u001b\u0006"
